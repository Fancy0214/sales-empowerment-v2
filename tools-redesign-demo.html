<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>销售工具箱 - 改版方案 Demo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0F1724;
            --ink-soft: #2A3A52;
            --cream: #FAF8F3;
            --cream-warm: #F5F0E6;
            --gold: #C4963C;
            --gold-glow: #D4A84C;
            --gold-dim: rgba(196,150,60,0.12);
            --navy: #1B2B4B;
            --navy-light: #2D4066;
            --slate: #6B8DAD;
            --mist: #E8E4DD;
            --mist-light: #F0EDE8;
            --shadow-sm: 0 1px 3px rgba(15,23,36,0.06);
            --shadow-md: 0 4px 16px rgba(15,23,36,0.08);
            --shadow-lg: 0 12px 40px rgba(15,23,36,0.12);
            --shadow-gold: 0 8px 32px rgba(196,150,60,0.15);
            --radius: 16px;
            --radius-sm: 10px;
            --radius-xs: 6px;
            --font-display: 'Playfair Display', Georgia, serif;
            --font-body: 'DM Sans', -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font-body);
            background: var(--cream);
            color: var(--ink);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== Background texture ===== */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 20% 0%, rgba(196,150,60,0.04) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(107,141,173,0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .page-wrap {
            position: relative;
            z-index: 1;
            max-width: 1280px;
            margin: 0 auto;
            padding: 40px 32px 80px;
        }

        /* ===== Header ===== */
        .header {
            text-align: center;
            margin-bottom: 48px;
            animation: fadeUp 0.8s var(--ease) both;
        }
        .header-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--gold);
            background: var(--gold-dim);
            padding: 6px 16px;
            border-radius: 20px;
            margin-bottom: 16px;
        }
        .header h1 {
            font-family: var(--font-display);
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 800;
            color: var(--ink);
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin-bottom: 12px;
        }
        .header h1 span {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-glow) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p {
            font-size: 1rem;
            color: var(--ink-soft);
            max-width: 500px;
            margin: 0 auto;
        }

        /* ===== Journey Timeline Navigation ===== */
        .journey-nav {
            position: relative;
            margin-bottom: 48px;
            padding: 0 16px;
            animation: fadeUp 0.8s var(--ease) 0.1s both;
        }
        .journey-track {
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            gap: 0;
        }
        /* 连接线 */
        .journey-track::before {
            content: '';
            position: absolute;
            top: 32px;
            left: 40px;
            right: 40px;
            height: 2px;
            background: var(--mist);
            z-index: 0;
        }
        .journey-track::after {
            content: '';
            position: absolute;
            top: 32px;
            left: 40px;
            height: 2px;
            background: linear-gradient(90deg, var(--gold), var(--gold-glow));
            z-index: 1;
            transition: width 0.6s var(--ease);
            width: var(--progress-width, 0%);
        }

        .journey-node {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            padding: 0 4px;
            flex: 1;
            transition: all 0.3s var(--ease);
        }
        .journey-node:hover .node-circle {
            transform: scale(1.1);
            box-shadow: var(--shadow-gold);
        }
        .node-circle {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--cream);
            border: 2px solid var(--mist);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--ink-soft);
            transition: all 0.4s var(--ease);
            position: relative;
        }
        .journey-node.active .node-circle {
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
            border-color: var(--navy);
            color: #fff;
            transform: scale(1.15);
            box-shadow: 0 8px 24px rgba(27,43,75,0.25);
        }
        .journey-node.visited .node-circle {
            border-color: var(--gold);
            color: var(--gold);
        }
        .journey-node.active.visited .node-circle {
            color: #fff;
        }
        .node-number {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--mist);
            color: var(--ink-soft);
            font-size: 0.65rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s var(--ease);
        }
        .journey-node.active .node-number {
            background: var(--gold);
            color: #fff;
        }
        .node-label {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--ink-soft);
            text-align: center;
            transition: color 0.3s var(--ease);
            line-height: 1.3;
        }
        .journey-node.active .node-label {
            color: var(--ink);
            font-weight: 700;
        }
        .node-tool-count {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--slate);
            background: var(--mist-light);
            padding: 2px 8px;
            border-radius: 10px;
            transition: all 0.3s var(--ease);
        }
        .journey-node.active .node-tool-count {
            background: var(--gold-dim);
            color: var(--gold);
        }

        /* ===== Stage Content Area ===== */
        .stage-view {
            animation: fadeUp 0.8s var(--ease) 0.2s both;
        }
        .stage-panel {
            display: none;
            animation: panelIn 0.5s var(--ease) both;
        }
        .stage-panel.active {
            display: block;
        }
        @keyframes panelIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stage-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
            padding: 20px 24px;
            background: var(--cream-warm);
            border-radius: var(--radius);
            border: 1px solid var(--mist-light);
        }
        .stage-header-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--navy), var(--navy-light));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #fff;
            flex-shrink: 0;
        }
        .stage-header-text h2 {
            font-family: var(--font-display);
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 4px;
        }
        .stage-header-text p {
            font-size: 0.85rem;
            color: var(--ink-soft);
        }
        .stage-header-badge {
            margin-left: auto;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--gold);
            background: var(--gold-dim);
            padding: 6px 14px;
            border-radius: 20px;
            white-space: nowrap;
        }

        /* ===== Tool Cards ===== */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }
        .tool-card {
            position: relative;
            background: #fff;
            border: 1px solid var(--mist);
            border-radius: var(--radius);
            padding: 24px;
            cursor: pointer;
            transition: all 0.35s var(--ease);
            overflow: hidden;
        }
        .tool-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--gold), var(--gold-glow));
            opacity: 0;
            transition: opacity 0.3s var(--ease);
        }
        .tool-card:hover {
            border-color: var(--gold);
            box-shadow: var(--shadow-lg);
            transform: translateY(-4px);
        }
        .tool-card:hover::before {
            opacity: 1;
        }
        .tool-card-icon-wrap {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: var(--cream-warm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.15rem;
            color: var(--navy);
            margin-bottom: 16px;
            transition: all 0.3s var(--ease);
        }
        .tool-card:hover .tool-card-icon-wrap {
            background: var(--navy);
            color: #fff;
            transform: scale(1.05);
        }
        .tool-card h4 {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tool-card p {
            font-size: 0.82rem;
            color: var(--ink-soft);
            line-height: 1.6;
            margin-bottom: 14px;
        }
        .tool-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .tool-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .tool-tag {
            font-size: 0.68rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 12px;
            background: var(--cream-warm);
            color: var(--ink-soft);
            transition: all 0.2s var(--ease);
        }
        .tool-tag.tag-clickable {
            cursor: pointer;
        }
        .tool-tag.tag-clickable:hover {
            background: var(--navy);
            color: #fff;
        }
        .tool-stages-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.68rem;
            color: var(--gold);
            font-weight: 600;
        }
        .tool-stages-indicator i {
            font-size: 0.6rem;
        }

        /* ===== Search & Filter Bar ===== */
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-box {
            position: relative;
            flex: 1;
            min-width: 220px;
        }
        .search-box i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--slate);
            font-size: 0.85rem;
        }
        .search-box input {
            width: 100%;
            padding: 12px 16px 12px 42px;
            border: 1px solid var(--mist);
            border-radius: var(--radius-sm);
            font-size: 0.88rem;
            font-family: var(--font-body);
            background: #fff;
            outline: none;
            transition: all 0.3s var(--ease);
        }
        .search-box input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px var(--gold-dim);
        }
        .search-box input::placeholder { color: var(--slate); }

        .view-toggle {
            display: flex;
            background: var(--cream-warm);
            border-radius: var(--radius-sm);
            padding: 4px;
            border: 1px solid var(--mist-light);
        }
        .view-toggle button {
            padding: 8px 16px;
            border: none;
            background: transparent;
            border-radius: var(--radius-xs);
            font-size: 0.78rem;
            font-weight: 600;
            font-family: var(--font-body);
            color: var(--ink-soft);
            cursor: pointer;
            transition: all 0.2s var(--ease);
        }
        .view-toggle button.active {
            background: #fff;
            color: var(--ink);
            box-shadow: var(--shadow-sm);
        }

        /* ===== Tag Filter Bar ===== */
        .tag-filter-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            padding: 12px 16px;
            background: #fff;
            border-radius: var(--radius);
            border: 1px solid var(--mist-light);
            box-shadow: var(--shadow-sm);
            animation: fadeUp 0.8s var(--ease) 0.12s both;
        }
        .tag-filter-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--ink-soft);
            margin-right: 4px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tag-filter-label i {
            font-size: 0.7rem;
            color: var(--slate);
        }
        .tag-chip {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.76rem;
            font-weight: 600;
            border: 1.5px solid var(--mist);
            background: var(--cream);
            color: var(--ink-soft);
            cursor: pointer;
            transition: all 0.25s var(--ease);
            user-select: none;
        }
        .tag-chip:hover {
            border-color: var(--gold);
            color: var(--gold);
            background: var(--gold-dim);
        }
        .tag-chip.active {
            border-color: var(--navy);
            background: var(--navy);
            color: #fff;
            box-shadow: 0 2px 8px rgba(27,43,75,0.18);
        }
        .tag-chip.active:hover {
            background: var(--navy-light);
            border-color: var(--navy-light);
            color: #fff;
        }
        .tag-filter-divider {
            width: 1px;
            height: 20px;
            background: var(--mist);
            margin: 0 4px;
        }
        .tag-chip-reset {
            padding: 5px 12px;
            border-radius: 16px;
            font-size: 0.7rem;
            font-weight: 600;
            border: 1px dashed var(--mist);
            background: transparent;
            color: var(--slate);
            cursor: pointer;
            transition: all 0.2s var(--ease);
        }
        .tag-chip-reset:hover {
            border-color: var(--slate);
            color: var(--ink-soft);
        }

        /* ===== All Stages View ===== */
        .all-stages-view {
            display: none;
        }
        .all-stages-view.active {
            display: block;
            animation: panelIn 0.4s var(--ease) both;
        }
        .all-stage-section {
            margin-bottom: 36px;
        }
        .all-stage-section .mini-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--mist);
        }
        .mini-header .mini-num {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--navy);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .mini-header h3 {
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 700;
            color: var(--ink);
        }
        .mini-header .mini-count {
            margin-left: auto;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--slate);
        }

        /* ===== Modal ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15,23,36,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s var(--ease);
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: #fff;
            border-radius: 20px;
            max-width: 640px;
            width: 92%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 36px;
            position: relative;
            animation: modalIn 0.4s var(--ease-bounce);
            box-shadow: 0 24px 80px rgba(15,23,36,0.2);
        }
        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--cream-warm);
            color: var(--ink-soft);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s var(--ease);
        }
        .modal-close:hover {
            background: var(--ink);
            color: #fff;
        }
        .modal-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--navy), var(--navy-light));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: #fff;
            margin-bottom: 20px;
        }
        .modal-box h2 {
            font-family: var(--font-display);
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 12px;
        }
        .modal-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .modal-meta .meta-tag {
            font-size: 0.72rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 14px;
        }
        .meta-tag.stage-tag {
            background: var(--gold-dim);
            color: var(--gold);
        }
        .meta-tag.func-tag {
            background: rgba(107,141,173,0.12);
            color: var(--slate);
        }
        .modal-body {
            font-size: 0.9rem;
            color: var(--ink-soft);
            line-height: 1.8;
        }

        /* ===== Stats Strip ===== */
        .stats-strip {
            display: flex;
            gap: 24px;
            margin-bottom: 32px;
            padding: 16px 24px;
            background: #fff;
            border-radius: var(--radius);
            border: 1px solid var(--mist-light);
            box-shadow: var(--shadow-sm);
            animation: fadeUp 0.8s var(--ease) 0.15s both;
        }
        .stat-block {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .stat-block .stat-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
        }
        .stat-block:nth-child(1) .stat-icon { background: var(--gold-dim); color: var(--gold); }
        .stat-block:nth-child(2) .stat-icon { background: rgba(27,43,75,0.08); color: var(--navy); }
        .stat-block:nth-child(3) .stat-icon { background: rgba(107,141,173,0.12); color: var(--slate); }
        .stat-num {
            font-family: var(--font-display);
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--ink);
            line-height: 1;
        }
        .stat-label {
            font-size: 0.72rem;
            color: var(--ink-soft);
        }

        /* ===== Animations ===== */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .page-wrap { padding: 24px 16px 60px; }
            .journey-track { flex-wrap: wrap; gap: 12px; justify-content: center; }
            .journey-track::before, .journey-track::after { display: none; }
            .journey-node { flex: 0 0 calc(33.33% - 8px); }
            .node-circle { width: 52px; height: 52px; font-size: 1rem; }
            .node-label { font-size: 0.7rem; }
            .tools-grid { grid-template-columns: 1fr; }
            .stats-strip { flex-wrap: wrap; gap: 16px; }
            .stage-header { flex-direction: column; align-items: flex-start; }
            .stage-header-badge { margin-left: 0; }
        }
    </style>
</head>
<body>
    <div class="page-wrap">
        <!-- Header -->
        <div class="header">
            <div class="header-label"><i class="fas fa-wand-magic-sparkles"></i> Redesign Demo</div>
            <h1>销售<span>工具箱</span></h1>
            <p>按客户旅程分阶段组织，快速定位每个节点需要的工具</p>
        </div>

        <!-- Stats -->
        <div class="stats-strip" id="statsStrip"></div>

        <!-- Journey Timeline Navigation -->
        <div class="journey-nav">
            <div class="journey-track" id="journeyTrack"></div>
        </div>

        <!-- Filter & Search -->
        <div class="filter-bar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="搜索工具名称、关键词..." oninput="handleSearch()">
            </div>
            <div class="view-toggle">
                <button class="active" data-view="stage" onclick="setView('stage')"><i class="fas fa-layer-group" style="margin-right:4px;"></i>分阶段</button>
                <button data-view="all" onclick="setView('all')"><i class="fas fa-th" style="margin-right:4px;"></i>总览</button>
            </div>
        </div>

        <!-- Tag Filter -->
        <div class="tag-filter-bar" id="tagFilterBar"></div>

        <!-- Single Stage View -->
        <div class="stage-view" id="stageView"></div>

        <!-- All Stages Overview -->
        <div class="all-stages-view" id="allStagesView"></div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
    // ===== Data =====
    const STAGES = [
        { id: 'consult',   name: '咨询签约',   icon: 'fa-handshake',       desc: '首次接触客户，建立信任，促成签约', color: '#4F46E5' },
        { id: 'planning',  name: '规划选校',   icon: 'fa-compass',         desc: '制定申请规划，确定目标院校', color: '#D97706' },
        { id: 'apply',     name: '申请递交',   icon: 'fa-paper-plane',     desc: '准备材料，提交申请，处理offer', color: '#2563EB' },
        { id: 'visa',      name: '签证办理',   icon: 'fa-passport',        desc: '签证材料准备与递交申请', color: '#059669' },
        { id: 'predepart', name: '行前准备',   icon: 'fa-plane-departure', desc: '出发前的各项准备事宜', color: '#DB2777' },
        { id: 'postentry', name: '入学后续',   icon: 'fa-graduation-cap',  desc: '落地后的收尾与后续事项', color: '#7C3AED' },
    ];

    const TOOLS = [
        {
            id: 'timeline', name: '留学时间规划',
            description: '英国硕士申请全流程时间节点与任务清单',
            icon: 'fa-clock',
            keywords: '留学 时间 规划 申请 流程 节点',
            stages: ['consult', 'planning'],
            tags: ['规划'],
            content: '英国硕士申请全流程时间节点与任务清单，涵盖从选校规划到入学报到的完整时间线：\n\n• 提前12-18个月：确定留学意向，开始语言准备\n• 提前9-12个月：确定目标院校，准备申请材料\n• 提前6-9个月：提交申请，跟进进度\n• 提前3-6个月：收到offer，确认入读\n• 提前1-3个月：办理签证，准备行前事宜\n• 入学后：注册报到，学历认证'
        },
        {
            id: 'predeparture', name: '留英行前指南',
            description: '签证、体检、换汇、行李、落地、生活全流程指引',
            icon: 'fa-plane-departure',
            keywords: '英国 行前 签证 体检 换汇 行李 落地 生活',
            stages: ['predepart'],
            tags: ['行前'],
            content: '英国留学行前全流程指引，覆盖签证确认、体检安排、换汇技巧、行李清单、落地报到、生活须知等方方面面。'
        },
        {
            id: 'degree_auth', name: '境外学历认证指南',
            description: '国（境）外学历学位认证全流程操作指引',
            icon: 'fa-certificate',
            keywords: '学历 认证 留服 国境外 学位',
            stages: ['postentry'],
            tags: ['认证'],
            content: '国（境）外学历学位认证全流程操作指引，包括留服中心认证申请步骤、所需材料清单、常见问题解答。'
        },
        {
            id: 'ireland_predeparture', name: '爱尔兰行前指南',
            description: '入境、IRP居留卡、行李准备、紧急联系全流程指引',
            icon: 'fa-leaf',
            keywords: '爱尔兰 行前 IRP 居留 入境 签证',
            stages: ['predepart'],
            tags: ['行前'],
            content: '爱尔兰留学行前全流程指引，涵盖入境须知、IRP居留卡办理、行李清单、紧急联系方式等。'
        },
        {
            id: 'ucas', name: 'UCAS申请说明',
            description: '英国本科UCAS申请流程、材料、时间线及注意事项',
            icon: 'fa-university',
            keywords: 'UCAS 本科 申请 英国 Buzzword 佣金',
            stages: ['apply'],
            tags: ['申请'],
            content: '英国本科UCAS申请全流程说明，包括申请系统操作、个人陈述撰写要点、推荐信要求、关键时间节点及佣金政策。'
        },
        {
            id: 'uk_visa', name: '英国学生签证指南',
            description: '签证材料、保证金、肺结核体检、申请流程全指引',
            icon: 'fa-passport',
            keywords: '英国 签证 学生 保证金 肺结核 体检',
            stages: ['visa'],
            tags: ['签证'],
            content: '英国学生签证全流程指引，涵盖CAS确认、保证金存款要求（金额/存期/来源证明）、肺结核体检预约、签证材料清单及在线申请步骤。'
        },
        {
            id: 'emergency_switch', name: '紧急换校指南',
            description: '紧急换校选校维度、推荐院校、换校流程全指引',
            icon: 'fa-exchange-alt',
            keywords: '紧急 换校 选校 谢菲尔德 诺丁汉 伯明翰 奖学金',
            stages: ['planning', 'apply'],
            tags: ['换校'],
            content: '紧急换校全指引，包括换校原因评估、目标院校筛选维度（排名/专业/地理位置/奖学金）、换校申请流程及注意事项。'
        },
        {
            id: 'writing_service', name: '文书外售服务报价',
            description: '2026-2027年度文书套餐及散件报价',
            icon: 'fa-file-invoice-dollar',
            keywords: '文书 外售 报价 PS 推荐信 简历 套餐',
            stages: ['consult', 'apply'],
            tags: ['报价'],
            content: '2026-2027年度文书外售服务报价单，包含PS个人陈述、推荐信、CV简历等文书套餐及散件价格。'
        },
        {
            id: 'uk_materials', name: '英国申请材料清单',
            description: '硕士及其他课程申请材料准备要点与注意事项',
            icon: 'fa-clipboard-list',
            keywords: '英国 申请 材料 清单 PS 推荐信 成绩单 雅思 护照 文书',
            stages: ['planning', 'apply'],
            tags: ['申请'],
            content: '英国硕士申请材料准备清单，涵盖PS、推荐信、成绩单、在读证明/毕业证、雅思成绩、护照、作品集等各类材料的具体要求与注意事项。'
        },
        {
            id: 'graduation_docs', name: '毕业材料办理温馨提示',
            description: '国内本科生毕业证、学位证、成绩单、均分证明办理指引',
            icon: 'fa-graduation-cap',
            keywords: '毕业 材料 办理 毕业证 学位证 成绩单 均分证明 翻译 盖章',
            stages: ['apply'],
            tags: ['申请'],
            content: '国内本科毕业材料办理指引，包括毕业证/学位证补领流程、成绩单打印与翻译盖章、均分证明开具等操作步骤。'
        },
        {
            id: 'deposit_refund', name: '留位费退费政策',
            description: '13所英国热门大学留位费退费规则汇总',
            icon: 'fa-sterling-sign',
            keywords: '留位费 退费 押金 deposit refund 冷静期 签证被拒',
            stages: ['planning', 'apply'],
            tags: ['申请'],
            content: '13所英国热门大学留位费（Deposit）退费政策汇总，包括退费条件、冷静期政策、签证被拒退费流程等关键信息。'
        },
    ];

    // ===== State =====
    let activeStage = 'consult';
    let currentView = 'stage'; // 'stage' | 'all'
    let searchQuery = '';
    let activeTags = []; // 选中的功能标签（多选）

    // ===== Render Journey Nav =====
    function renderJourneyNav() {
        const track = document.getElementById('journeyTrack');
        let html = '';
        STAGES.forEach((stage, i) => {
            const toolCount = TOOLS.filter(t => t.stages.includes(stage.id)).length;
            const isActive = stage.id === activeStage;
            const isVisited = STAGES.findIndex(s => s.id === activeStage) > i;
            html += `
            <div class="journey-node ${isActive ? 'active' : ''} ${isVisited ? 'visited' : ''}" 
                 onclick="selectStage('${stage.id}')" data-stage="${stage.id}">
                <div class="node-circle">
                    <i class="fas ${stage.icon}"></i>
                    <span class="node-number">${i + 1}</span>
                </div>
                <span class="node-label">${stage.name}</span>
                <span class="node-tool-count">${toolCount} 工具</span>
            </div>`;
        });
        track.innerHTML = html;
        updateProgress();
    }

    function updateProgress() {
        const idx = STAGES.findIndex(s => s.id === activeStage);
        const track = document.getElementById('journeyTrack');
        const pct = (idx / (STAGES.length - 1)) * 100;
        track.style.setProperty('--progress-width', `calc(${pct}% - ${pct > 0 ? 0 : 0}px)`);
    }

    function selectStage(stageId) {
        activeStage = stageId;
        renderJourneyNav();
        renderStageView();
    }

    // ===== Render Stage View =====
    function renderStageView() {
        if (currentView !== 'stage') return;
        const container = document.getElementById('stageView');
        const stage = STAGES.find(s => s.id === activeStage);
        const filteredTools = getFilteredTools().filter(t => t.stages.includes(activeStage));

        let html = `
        <div class="stage-panel active">
            <div class="stage-header">
                <div class="stage-header-icon"><i class="fas ${stage.icon}"></i></div>
                <div class="stage-header-text">
                    <h2>${stage.name}</h2>
                    <p>${stage.desc}</p>
                </div>
                <div class="stage-header-badge">${filteredTools.length} 个工具可用</div>
            </div>
            <div class="tools-grid">`;

        if (filteredTools.length === 0) {
            html += `<div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--slate);">
                <i class="fas fa-inbox" style="font-size:2rem;margin-bottom:12px;display:block;opacity:0.4;"></i>
                <p>该阶段暂无匹配工具</p>
            </div>`;
        } else {
            filteredTools.forEach((tool, i) => {
                html += renderToolCard(tool, i);
            });
        }

        html += `</div></div>`;
        container.innerHTML = html;
    }

    function renderToolCard(tool, delayIdx = 0) {
        const isMulti = tool.stages.length > 1;
        return `
        <div class="tool-card" onclick="openTool('${tool.id}')" style="animation: fadeUp 0.5s var(--ease) ${delayIdx * 0.06}s both;">
            <div class="tool-card-icon-wrap"><i class="fas ${tool.icon}"></i></div>
            <h4>${tool.name}</h4>
            <p>${tool.description}</p>
            <div class="tool-card-footer">
                <div class="tool-tags">
                    ${tool.tags.map(t => `<span class="tool-tag tag-clickable" onclick="event.stopPropagation();toggleTag('${t}')">${t}</span>`).join('')}
                </div>
                ${isMulti ? `<span class="tool-stages-indicator"><i class="fas fa-diagram-project"></i> ${tool.stages.length}阶段</span>` : ''}
            </div>
        </div>`;
    }

    // ===== Render All Stages View =====
    function renderAllStagesView() {
        if (currentView !== 'all') return;
        const container = document.getElementById('allStagesView');
        const filtered = getFilteredTools();
        let html = '';

        STAGES.forEach((stage, idx) => {
            const stageTools = filtered.filter(t => t.stages.includes(stage.id));
            if (stageTools.length === 0) return;

            html += `
            <div class="all-stage-section">
                <div class="mini-header">
                    <span class="mini-num">${idx + 1}</span>
                    <h3>${stage.name}</h3>
                    <span class="mini-count">${stageTools.length} 个工具</span>
                </div>
                <div class="tools-grid">
                    ${stageTools.map((t, i) => renderToolCard(t, i)).join('')}
                </div>
            </div>`;
        });

        container.innerHTML = html;
    }

    // ===== Render Tag Filter Bar =====
    function renderTagFilter() {
        const allTags = [...new Set(TOOLS.flatMap(t => t.tags))];
        const bar = document.getElementById('tagFilterBar');
        let html = `<span class="tag-filter-label"><i class="fas fa-tags"></i>功能标签</span>`;
        allTags.forEach(tag => {
            const isActive = activeTags.includes(tag);
            html += `<span class="tag-chip ${isActive ? 'active' : ''}" onclick="toggleTag('${tag}')">${tag}</span>`;
        });
        if (activeTags.length > 0) {
            html += `<span class="tag-filter-divider"></span>`;
            html += `<span class="tag-chip-reset" onclick="clearTags()"><i class="fas fa-times" style="margin-right:3px;font-size:0.6rem;"></i>清除</span>`;
        }
        bar.innerHTML = html;
    }

    function toggleTag(tag) {
        const idx = activeTags.indexOf(tag);
        if (idx >= 0) activeTags.splice(idx, 1);
        else activeTags.push(tag);
        renderTagFilter();
        if (currentView === 'stage') renderStageView();
        else renderAllStagesView();
    }

    function clearTags() {
        activeTags = [];
        renderTagFilter();
        if (currentView === 'stage') renderStageView();
        else renderAllStagesView();
    }

    // ===== Helpers =====
    function getFilteredTools() {
        let result = TOOLS;
        // 搜索过滤
        if (searchQuery) {
            const q = searchQuery.toLowerCase();
            result = result.filter(t => {
                const haystack = `${t.name} ${t.description} ${t.keywords} ${t.tags.join(' ')}`.toLowerCase();
                return haystack.includes(q);
            });
        }
        // 标签过滤（多选，任一匹配即可）
        if (activeTags.length > 0) {
            result = result.filter(t => t.tags.some(tag => activeTags.includes(tag)));
        }
        return result;
    }

    function handleSearch() {
        searchQuery = document.getElementById('searchInput').value.trim();
        if (currentView === 'stage') renderStageView();
        else renderAllStagesView();
    }

    function setView(view) {
        currentView = view;
        document.querySelectorAll('.view-toggle button').forEach(b => {
            b.classList.toggle('active', b.dataset.view === view);
        });
        document.getElementById('stageView').style.display = view === 'stage' ? 'block' : 'none';
        document.getElementById('allStagesView').classList.toggle('active', view === 'all');
        if (view === 'stage') renderStageView();
        else renderAllStagesView();
    }

    // ===== Modal =====
    function openTool(toolId) {
        const tool = TOOLS.find(t => t.id === toolId);
        if (!tool) return;
        const stageNames = tool.stages.map(sid => {
            const s = STAGES.find(st => st.id === sid);
            return s ? s.name : sid;
        });
        document.getElementById('modalContent').innerHTML = `
            <div class="modal-icon"><i class="fas ${tool.icon}"></i></div>
            <h2>${tool.name}</h2>
            <div class="modal-meta">
                ${stageNames.map(n => `<span class="meta-tag stage-tag"><i class="fas fa-route" style="margin-right:4px;font-size:0.6rem;"></i>${n}</span>`).join('')}
                ${tool.tags.map(t => `<span class="meta-tag func-tag">${t}</span>`).join('')}
            </div>
            <div class="modal-body">${tool.content.replace(/\n/g, '<br>')}</div>
        `;
        document.getElementById('modal').classList.add('show');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('show');
        document.body.style.overflow = '';
    }

    // ===== Stats =====
    function renderStats() {
        const multiCount = TOOLS.filter(t => t.stages.length > 1).length;
        const allTags = [...new Set(TOOLS.flatMap(t => t.tags))];
        document.getElementById('statsStrip').innerHTML = `
            <div class="stat-block">
                <div class="stat-icon"><i class="fas fa-toolbox"></i></div>
                <div><div class="stat-num">${TOOLS.length}</div><div class="stat-label">工具总数</div></div>
            </div>
            <div class="stat-block">
                <div class="stat-icon"><i class="fas fa-route"></i></div>
                <div><div class="stat-num">${STAGES.length}</div><div class="stat-label">旅程阶段</div></div>
            </div>
            <div class="stat-block">
                <div class="stat-icon"><i class="fas fa-layer-group"></i></div>
                <div><div class="stat-num">${multiCount}</div><div class="stat-label">跨阶段工具</div></div>
            </div>
        `;
    }

    // ===== Init =====
    renderStats();
    renderJourneyNav();
    renderTagFilter();
    renderStageView();
    document.getElementById('allStagesView').style.display = 'none';
    </script>
</body>
</html>
